<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reco — Documentación</title>
    <meta name="description" content="Páginas públicas de Reco: Privacy Policy." />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0f17;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --link: #7aa7ff;
        --border: rgba(255, 255, 255, 0.12);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: #ffffff;
          --text: #0b1020;
          --muted: rgba(11, 16, 32, 0.68);
          --link: #1d4ed8;
          --border: rgba(11, 16, 32, 0.12);
        }
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 20% -20%, rgba(122, 167, 255, 0.22), transparent 55%),
          radial-gradient(900px 500px at 90% 20%, rgba(99, 102, 241, 0.18), transparent 55%),
          var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      .badge {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--muted);
        white-space: nowrap;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        margin-top: 14px;
        backdrop-filter: blur(10px);
      }
      p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      ul {
        margin: 12px 0 0;
        padding-left: 18px;
        color: var(--muted);
      }
      footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Reco — páginas públicas</h1>
        <div class="badge">GitHub Pages</div>
      </header>

      <div class="card">
        <strong>Documentos</strong>
        <p>Enlaces públicos necesarios para publicación (por ejemplo, tiendas de apps).</p>
        <ul>
          <li><a href="./privacy-policy.html">Privacy Policy</a></li>
        </ul>
      </div>

      <footer>
        <div>Repositorio: RecoApp</div>
      </footer>
    </div>
  </body>
</html>
